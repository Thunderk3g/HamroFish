services:
  hamrofish:
    image: ghcr.io/666ghj/hamrofish:latest
    # Mirror image (use if pulling is slow):
    # image: ghcr.nju.edu.cn/666ghj/hamrofish:latest
    container_name: hamrofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
